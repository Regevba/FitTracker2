name: PR Integrity Check

# Per-PR Auditor Agent enforcement (v7.6 Phase 2a, shipped 2026-04-25).
# Tightens v7.5's 72h cycle into a per-PR check: any PR that introduces NEW
# integrity findings vs main is blocked at the status-check layer.
#
# Security note (per github.blog injection guide): all dynamic values are
# either SHAs (hex), integers (PR numbers), or step outputs we set ourselves
# (delta, summary, etc.). No untrusted text fields like PR titles, bodies,
# commit messages, author names, or branch names are interpolated into shell
# `run:` blocks. Step outputs are routed through the env vars block when used
# in run: shells.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: pr-integrity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run schema check on PR HEAD
        id: schema
        continue-on-error: true
        run: |
          set +e
          python3 scripts/check-state-schema.py 2>&1 | tee /tmp/pr-schema.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run integrity check on PR HEAD
        id: integrity
        continue-on-error: true
        run: |
          set +e
          python3 scripts/integrity-check.py --findings-only 2>&1 | tee /tmp/pr-integrity.txt
          # Extract integer findings count from the line "Findings: N (...)".
          pr_findings=$(grep -E "^Findings:" /tmp/pr-integrity.txt | awk '{print $2}')
          [ -z "$pr_findings" ] && pr_findings=0
          echo "pr_findings=${pr_findings}" >> "$GITHUB_OUTPUT"
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run measurement-adoption against PR HEAD
        id: adoption
        continue-on-error: true
        run: |
          set +e
          python3 scripts/measurement-adoption-report.py \
            --output /tmp/pr-adoption.json \
            --history-output /tmp/pr-adoption-history.json \
            --snapshot-trigger pr_bot 2>&1 | tee /tmp/pr-adoption.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Capture main baseline via worktree
        id: baseline
        continue-on-error: true
        run: |
          set +e
          # Use a clean worktree of origin/main so the PR working tree stays
          # untouched. Avoids dirty-tree side effects from in-place checkout.
          if ! git worktree add /tmp/main-tree origin/main; then
            echo "main_findings=0" >> "$GITHUB_OUTPUT"
            echo "baseline_unavailable=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          (cd /tmp/main-tree && python3 scripts/integrity-check.py --findings-only) \
            > /tmp/main-integrity.txt 2>&1 || true
          main_findings=$(grep -E "^Findings:" /tmp/main-integrity.txt | awk '{print $2}')
          [ -z "$main_findings" ] && main_findings=0
          echo "main_findings=${main_findings}" >> "$GITHUB_OUTPUT"
          git worktree remove --force /tmp/main-tree || true

      - name: Compute delta + status
        id: delta
        env:
          PR_FINDINGS: ${{ steps.integrity.outputs.pr_findings }}
          MAIN_FINDINGS: ${{ steps.baseline.outputs.main_findings }}
          SCHEMA_EXIT: ${{ steps.schema.outputs.exit }}
          INTEGRITY_EXIT: ${{ steps.integrity.outputs.exit }}
          ADOPTION_EXIT: ${{ steps.adoption.outputs.exit }}
        run: |
          pr=${PR_FINDINGS:-0}
          main=${MAIN_FINDINGS:-0}
          schema_exit=${SCHEMA_EXIT:-0}
          integrity_exit=${INTEGRITY_EXIT:-0}
          adoption_exit=${ADOPTION_EXIT:-0}
          delta=$((pr - main))
          if [ "$schema_exit" != "0" ] || [ "$integrity_exit" != "0" ] || [ "$adoption_exit" != "0" ]; then
            status=failure
            summary="FAIL — required command failed (schema=${schema_exit}, integrity=${integrity_exit}, adoption=${adoption_exit})"
          elif [ "$delta" -le 0 ]; then
            status=success
            summary="PASS — no new findings vs main (${pr} findings, ${main} on main)"
          else
            status=failure
            summary="FAIL — ${delta} new findings vs main (${pr} findings, ${main} on main)"
          fi
          {
            echo "status=${status}"
            echo "delta=${delta}"
            echo "pr_findings=${pr}"
            echo "main_findings=${main}"
            echo "schema_exit=${schema_exit}"
            echo "integrity_exit=${integrity_exit}"
            echo "adoption_exit=${adoption_exit}"
            echo "summary=${summary}"
          } >> "$GITHUB_OUTPUT"

      - name: Set commit status check
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.delta.outputs.status }}
          SUMMARY: ${{ steps.delta.outputs.summary }}
        with:
          script: |
            const status = process.env.STATUS;
            const summary = process.env.SUMMARY || '';
            const sha = context.payload.pull_request.head.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: status,
              context: 'pm-framework/pr-integrity',
              description: summary.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Read script outputs into env
        id: outputs
        run: |
          {
            echo 'INTEGRITY_OUT<<INTEGRITY_EOF'
            head -c 4000 /tmp/pr-integrity.txt 2>/dev/null || echo "(no output)"
            echo INTEGRITY_EOF
          } >> "$GITHUB_ENV"

      - name: Sticky-comment on PR
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.delta.outputs.status }}
          SUMMARY: ${{ steps.delta.outputs.summary }}
          PR_FINDINGS: ${{ steps.delta.outputs.pr_findings }}
          MAIN_FINDINGS: ${{ steps.delta.outputs.main_findings }}
          DELTA: ${{ steps.delta.outputs.delta }}
          SCHEMA_EXIT: ${{ steps.delta.outputs.schema_exit }}
          INTEGRITY_EXIT: ${{ steps.delta.outputs.integrity_exit }}
          ADOPTION_EXIT: ${{ steps.delta.outputs.adoption_exit }}
          BASELINE_UNAVAILABLE: ${{ steps.baseline.outputs.baseline_unavailable }}
        with:
          script: |
            const MARKER = '<!-- pm-framework-pr-integrity-bot -->';
            const status = process.env.STATUS;
            const summary = process.env.SUMMARY || '';
            const pr = process.env.PR_FINDINGS || '0';
            const main = process.env.MAIN_FINDINGS || '0';
            const delta = process.env.DELTA || '0';
            const schemaExit = process.env.SCHEMA_EXIT || '0';
            const integrityExit = process.env.INTEGRITY_EXIT || '0';
            const adoptionExit = process.env.ADOPTION_EXIT || '0';
            const baselineWarning = process.env.BASELINE_UNAVAILABLE === 'true'
              ? '\n> Could not capture main baseline — treating as 0 findings.\n'
              : '';
            const integrityOut = process.env.INTEGRITY_OUT || '(no output)';
            const body = [
              MARKER,
              `## PM Framework Integrity Check`,
              ``,
              `**Status:** ${status === 'success' ? 'PASS' : 'FAIL'} — ${summary}`,
              ``,
              `**Findings delta vs main:** ${pr} − ${main} = **${delta}** new findings.`,
              ``,
              `**Required command exits:** schema=${schemaExit}, integrity=${integrityExit}, measurement-adoption=${adoptionExit}.`,
              baselineWarning,
              `<details><summary>Full integrity check output</summary>`,
              ``,
              '```',
              integrityOut,
              '```',
              `</details>`,
              ``,
              `<sub>Re-runs on every push. Last run: ${new Date().toISOString()}. Workflow: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              if (existing.body === body) {
                core.info('Sticky comment unchanged — skipping update');
                return;
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('Sticky comment updated');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.info('Sticky comment created');
            }

      - name: Workflow summary
        if: always()
        env:
          SUMMARY: ${{ steps.delta.outputs.summary }}
          PR_FINDINGS: ${{ steps.delta.outputs.pr_findings }}
          MAIN_FINDINGS: ${{ steps.delta.outputs.main_findings }}
          DELTA: ${{ steps.delta.outputs.delta }}
          SCHEMA_EXIT: ${{ steps.delta.outputs.schema_exit }}
          INTEGRITY_EXIT: ${{ steps.delta.outputs.integrity_exit }}
          ADOPTION_EXIT: ${{ steps.delta.outputs.adoption_exit }}
        run: |
          {
            echo "## PR Integrity Check Summary"
            echo ""
            printf '%s\n' "**Status:** $SUMMARY"
            echo ""
            printf '**Delta:** PR %s − main %s = %s\n' "$PR_FINDINGS" "$MAIN_FINDINGS" "$DELTA"
            echo ""
            printf '**Required command exits:** schema=%s, integrity=%s, measurement-adoption=%s\n' "$SCHEMA_EXIT" "$INTEGRITY_EXIT" "$ADOPTION_EXIT"
            echo ""
            echo "### Integrity check output"
            echo '```'
            cat /tmp/pr-integrity.txt 2>/dev/null || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
