name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    env:
      PROJECT_PATH: FitTracker.xcodeproj
      SCHEME: FitTracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Full CI pipeline
        id: ci
        continue-on-error: true
        run: |
          exec > >(tee /tmp/ci.log) 2>&1
          set -x

          echo "========== NODE + TOKEN PIPELINE =========="
          node --version || true
          npm install --silent
          make tokens-check

          echo "========== XCODE SETUP =========="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode apps found"
          xcode-select -p
          xcodebuild -version

          echo "========== SCHEMES =========="
          xcodebuild -project "$PROJECT_PATH" -list

          echo "========== SIMULATORS =========="
          xcrun simctl list devices available | grep -i iphone | head -20

          echo "========== RESOLVE SIMULATOR =========="
          sim_list="$(xcrun simctl list devices available)"
          SIM_DEST=""
          for d in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            if echo "$sim_list" | grep -F "${d} (" >/dev/null; then
              SIM_DEST="platform=iOS Simulator,name=${d}"
              echo "Selected: ${d}"
              break
            fi
          done
          if [ -z "$SIM_DEST" ]; then
            fb="$(echo "$sim_list" | grep -oE 'iPhone [^(]+' | head -1 | xargs)"
            SIM_DEST="platform=iOS Simulator,name=${fb}"
            echo "Fallback: ${fb}"
          fi

          echo "========== SPM RESOLVE =========="
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

          echo "========== BUILD =========="
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

          echo "========== TEST =========="
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$SIM_DEST" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

          echo "========== ALL PASSED =========="

      - name: Post log as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI Log (outcome: ${{ steps.ci.outcome }})\n\n';
            try {
              const log = fs.readFileSync('/tmp/ci.log', 'utf8');
              const lines = log.split('\n');
              const errors = lines.filter(l => /error:|BUILD FAILED|FAILED|exit code [1-9]/i.test(l));
              body += '**Errors:**\n```\n' + (errors.length ? errors.slice(0,50).join('\n') : 'None extracted') + '\n```\n\n';
              body += '<details><summary>Last 200 lines</summary>\n\n```\n' + lines.slice(-200).join('\n') + '\n```\n</details>\n';
            } catch (e) {
              body += 'Log file not found: ' + e.message;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });

      - name: Fail if CI failed
        if: steps.ci.outcome == 'failure'
        run: exit 1

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fittracker-testresults-xcresult
          path: TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore
