name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show available simulators
        run: xcrun simctl list devicetypes | grep iPhone

      - name: Show available Xcode schemes
        run: xcodebuild -project FitTracker.xcodeproj -list

      - name: Build
        run: |
          xcodebuild build \
            -project FitTracker.xcodeproj \
            -scheme FitTracker \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project FitTracker.xcodeproj \
            -scheme FitTracker \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO
