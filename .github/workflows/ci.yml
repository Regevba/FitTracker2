name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    env:
      PROJECT_PATH: FitTracker.xcodeproj
      SCHEME: FitTracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for token pipeline CI gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies (Style Dictionary)
        run: npm install --silent

      - name: Verify DesignTokens.swift is in sync with tokens.json
        run: make tokens-check

      - name: Xcode setup and build
        id: build
        run: |
          exec > >(tee /tmp/ci-full.log) 2>&1

          echo "=== STEP: Available Xcode versions ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found"

          echo "=== STEP: Select Xcode ==="
          if [ -d "/Applications/Xcode_26.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          else
            echo "Using default Xcode"
          fi
          xcode-select -p
          xcodebuild -version

          echo "=== STEP: Schemes ==="
          xcodebuild -project "$PROJECT_PATH" -list

          echo "=== STEP: Simulators ==="
          xcrun simctl list devices available | grep -i iphone | head -15

          echo "=== STEP: Resolve simulator ==="
          simulator_list="$(xcrun simctl list devices available)"
          for device in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            if grep -F "${device} (" <<< "$simulator_list" >/dev/null; then
              echo "SIMULATOR_DESTINATION=platform=iOS Simulator,name=${device}" >> "$GITHUB_ENV"
              echo "Selected simulator: ${device}"
              break
            fi
          done
          # Fallback
          if ! grep -q SIMULATOR_DESTINATION "$GITHUB_ENV" 2>/dev/null; then
            fallback="$(echo "$simulator_list" | grep -oE 'iPhone [^(]+' | head -1 | xargs)"
            if [ -n "$fallback" ]; then
              echo "SIMULATOR_DESTINATION=platform=iOS Simulator,name=${fallback}" >> "$GITHUB_ENV"
              echo "Fallback simulator: ${fallback}"
            else
              echo "ERROR: No iPhone simulator found"
              exit 1
            fi
          fi

          echo "=== STEP: Resolve Swift packages ==="
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" 2>&1 | tail -30

          echo "=== STEP: Build ==="
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -100

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/test.log | tail -80

      - name: Post failure log as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI Failure Log\n\n';
            for (const [label, f] of [['Full CI log', '/tmp/ci-full.log'], ['Test log', '/tmp/test.log']]) {
              try {
                const log = fs.readFileSync(f, 'utf8');
                const lines = log.split('\n');
                const errors = lines.filter(l => /error:|fatal error|BUILD FAILED|exit code/i.test(l));
                const tail = lines.slice(-150).join('\n');
                body += `### ${label}\n`;
                if (errors.length > 0) {
                  body += '**Errors:**\n```\n' + errors.slice(0, 40).join('\n') + '\n```\n';
                }
                body += '<details><summary>Last 150 lines</summary>\n\n```\n' + tail + '\n```\n</details>\n\n';
              } catch (e) {
                body += `### ${label}\nNot found\n\n`;
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fittracker-testresults-xcresult
          path: TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore
