name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    env:
      PROJECT_PATH: FitTracker.xcodeproj
      SCHEME: FitTracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for token pipeline CI gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies (Style Dictionary)
        run: npm install --silent

      - name: Verify DesignTokens.swift is in sync with tokens.json
        run: make tokens-check

      - name: Select Xcode
        run: |
          echo "=== Available Xcode versions ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found in /Applications"
          echo ""
          # Try Xcode 26.3 first, fall back to latest available
          if [ -d "/Applications/Xcode_26.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          else
            echo "Using default Xcode"
          fi
          echo "=== Selected Xcode ==="
          xcode-select -p
          xcodebuild -version

      - name: Show available Xcode schemes
        run: xcodebuild -project "$PROJECT_PATH" -list

      - name: Show available iOS simulators
        run: xcrun simctl list devices available

      - name: Resolve preferred simulator destination
        shell: bash
        run: |
          set -euo pipefail

          simulator_list="$(xcrun simctl list devices available)"
          preferred_devices=(
            "iPhone 17"
            "iPhone 16e"
            "iPhone 16 Pro"
            "iPhone 16"
            "iPhone 15 Pro"
            "iPhone 15"
            "iPhone 14 Pro"
            "iPhone 14"
          )

          for device in "${preferred_devices[@]}"; do
            if grep -F "${device} (" <<< "$simulator_list" >/dev/null; then
              echo "SIMULATOR_DESTINATION=platform=iOS Simulator,name=${device}" >> "$GITHUB_ENV"
              echo "Selected simulator: ${device}"
              exit 0
            fi
          done

          # Fallback: pick the first available iPhone simulator
          fallback="$(echo "$simulator_list" | grep -oE 'iPhone [^(]+' | head -1 | xargs)"
          if [ -n "$fallback" ]; then
            echo "SIMULATOR_DESTINATION=platform=iOS Simulator,name=${fallback}" >> "$GITHUB_ENV"
            echo "Selected fallback simulator: ${fallback}"
            exit 0
          fi

          echo "No supported simulator found." >&2
          echo "Available devices:" >&2
          echo "$simulator_list" >&2
          exit 1

      - name: Resolve Swift packages
        run: |
          echo "::group::SPM Resolution"
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" 2>&1 | tail -50
          echo "::endgroup::"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/build.log | tail -80

      - name: Print build errors on failure
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -200 /tmp/build.log
          echo "=== ERRORS ONLY ==="
          grep -i 'error:' /tmp/build.log || echo "No error: lines found"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/test.log | tail -80

      - name: Print test errors on failure
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF TEST LOG ==="
          tail -200 /tmp/test.log 2>/dev/null || echo "No test log (build may have failed)"
          echo "=== ERRORS ONLY ==="
          grep -i 'error:\|failed' /tmp/test.log 2>/dev/null || echo "No error lines found"

      - name: Post build errors as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI Build Failure Log\n\n';
            for (const f of ['/tmp/build.log', '/tmp/test.log']) {
              try {
                const log = fs.readFileSync(f, 'utf8');
                const lines = log.split('\n');
                const errors = lines.filter(l => /error:|fatal:|failed/i.test(l));
                const tail = lines.slice(-100).join('\n');
                body += `### ${f}\n`;
                if (errors.length > 0) {
                  body += '**Errors found:**\n```\n' + errors.slice(0, 30).join('\n') + '\n```\n';
                }
                body += '<details><summary>Last 100 lines</summary>\n\n```\n' + tail + '\n```\n</details>\n\n';
              } catch (e) {
                body += `### ${f}\nNot found (step may not have run)\n\n`;
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fittracker-testresults-xcresult
          path: TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore
