name: CI

# Run the full iOS Build + xctest pipeline ONLY when iOS-relevant paths change.
# Pure docs/operator-ledger PRs are handled by the sibling `ci-docs-skip.yml`
# workflow which publishes a `Build and Test` status check by name-match in
# seconds, satisfying branch protection without paying the ~10-15min iOS cost.
#
# Path filter inclusions (anything matching -> full pipeline):
# - FitTracker/**, FitTrackerTests/**, FitTrackerUITests/**,
#   FitTracker.xcodeproj/** -- Swift code + Xcode project files
# - design-tokens/** + Makefile -- `make tokens-check` runs in this pipeline
# - scripts/ui-audit.py -- token compliance scanner triggered by Makefile
# - .github/workflows/ci.yml itself -- workflow-config edits must re-validate
# - Package.swift -- SPM manifest changes affect the build
#
# Anything NOT in these globs falls through to the docs-skip workflow.
# `push: main` keeps the full pipeline on main-branch merges so the
# trunk-of-record is always known-good against the full suite.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'FitTracker/**'
      - 'FitTrackerTests/**'
      - 'FitTrackerUITests/**'
      - 'FitTracker.xcodeproj/**'
      - 'design-tokens/**'
      - 'Makefile'
      - 'scripts/ui-audit.py'
      - '.github/workflows/ci.yml'
      - 'Package.swift'
      # Token-pipeline drivers: a bump/edit here must run `make tokens-check`,
      # not get the synthetic ci-docs-skip green. Closes the W29 silent-pass
      # where a style-dictionary major bump (PR #668) passed PR CI but breaks
      # `make tokens` on the post-merge `push: main` run. Keep in exact sync
      # with ci-docs-skip.yml's paths-ignore mirror.
      - 'package.json'
      - 'package-lock.json'
      - 'sd.config.js'
      - 'scripts/check-tokens.js'
  push:
    branches:
      - main
  workflow_dispatch:

# ci.yml-specific concurrency group. We use a hardcoded prefix here (NOT
# the workflow name expression) because ci-docs-skip.yml ALSO has `name:
# CI` — the workflow-name expression would resolve identically in both
# files and the two workflows would clash on the same group, racing each
# other into mutual cancellation on every mixed-content PR. See
# .claude/integrity/observed-patterns.md W26 for the historical incident.
concurrency:
  group: ci-yml-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    # Skip iOS build/test for Dependabot PRs — they update npm/JS deps in
    # /dashboard or /website and never touch Swift code. GitHub denies repo
    # secrets to Dependabot anyway, so even with the stub-plist fallback
    # from PR #398, Firebase tries to configure with invalid IDs and the
    # app crashes on launch → UI tests time out. Skipping the job entirely
    # is cheaper and avoids the false-failure. If Dependabot ever proposes
    # an SPM/iOS-relevant change, manually convert the PR (close + reopen
    # from a non-Dependabot branch) to run the full pipeline.
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-15
    env:
      PROJECT_PATH: FitTracker.xcodeproj
      SCHEME: FitTracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Decode GoogleService-Info.plist
        env:
          PLIST_BASE64: ${{ secrets.GOOGLESERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "$PLIST_BASE64" ]; then
            # GitHub does not expose repo secrets to Dependabot PRs (or forks);
            # in those contexts write a minimal stub so xcodebuild's resource
            # phase succeeds. Analytics tests will silently fall back to
            # MockAnalyticsAdapter — acceptable for dep-bump PRs that don't
            # touch iOS code paths. Operator-owned PRs and main-branch builds
            # still get the real secret and exercise the real adapter.
            echo "::warning::GOOGLESERVICE_INFO_PLIST_BASE64 secret not exposed (Dependabot PR or fork). Writing stub plist; iOS analytics tests will use MockAnalyticsAdapter."
            cat > FitTracker/GoogleService-Info.plist <<'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key><string>com.fittracker.regev</string>
            <key>PROJECT_ID</key><string>stub-no-secret</string>
            <key>GCM_SENDER_ID</key><string>0</string>
            <key>GOOGLE_APP_ID</key><string>1:0:ios:stub</string>
            <key>API_KEY</key><string>stub</string>
            <key>STORAGE_BUCKET</key><string>stub.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
          </dict>
          </plist>
          PLIST_EOF
            echo "Wrote stub plist ($(wc -c < FitTracker/GoogleService-Info.plist) bytes)"
            exit 0
          fi
          echo "$PLIST_BASE64" | base64 -d > FitTracker/GoogleService-Info.plist
          echo "Decoded plist ($(wc -c < FitTracker/GoogleService-Info.plist) bytes)"

      - name: Full CI pipeline
        shell: bash
        run: |
          set -euo pipefail

          # Token pipeline
          echo "::group::Token Pipeline"
          npm install --silent
          make tokens-check
          echo "::endgroup::"

          # Xcode setup
          echo "::group::Xcode Setup"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode apps"
          xcodebuild -version
          echo "::endgroup::"

          # Schemes
          echo "::group::Schemes"
          xcodebuild -project "$PROJECT_PATH" -list
          echo "::endgroup::"

          # Simulator
          echo "::group::Simulator"
          sim_list="$(xcrun simctl list devices available)"
          echo "$sim_list" | grep -i iphone | head -10
          SIM_DEST=""
          for d in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            if echo "$sim_list" | grep -qF "${d} ("; then
              SIM_DEST="platform=iOS Simulator,name=${d}"
              echo "Selected: ${d}"
              break
            fi
          done
          if [ -z "$SIM_DEST" ]; then
            fb="$(echo "$sim_list" | grep -oE 'iPhone [^(]+' | head -1 | xargs)"
            SIM_DEST="platform=iOS Simulator,name=${fb}"
            echo "Fallback: ${fb}"
          fi
          echo "::endgroup::"

          # SPM
          echo "::group::SPM Resolve"
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"
          echo "::endgroup::"

          # Build — ad-hoc sign so entitlements (incl. the implicit
          # keychain-access-group for the bundle ID) are applied. Without this
          # the iOS Simulator keychain rejects ops with errSecMissingEntitlement
          # (-34018), failing EncryptionServiceTests + KeychainHelperTests.
          # CODE_SIGN_IDENTITY=- is ad-hoc signing — no Apple team needed,
          # works on simulator.
          echo "::group::Build"
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES 2>&1 | tee /tmp/build.log
          echo "::endgroup::"

          # Test — same signing flags so the test host can hit the keychain.
          # -parallel-testing-enabled NO: avoids iOS Simulator clone churn that
          # produced a class of nondeterministic UI test flakes (different tests
          # failed each run on PRs that touched zero Swift code; main itself
          # flaked the same way). Trades ~5-10 min of serial test time for
          # deterministic CI. PR #160's narrower XCTSkipIf quarantine in
          # HomeReadinessUITests becomes redundant after this lands.
          echo "::group::Test"
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$SIM_DEST" \
            -resultBundlePath TestResults.xcresult \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES 2>&1 | tee /tmp/test.log
          echo "::endgroup::"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 3
          if-no-files-found: ignore

      - name: Comment error summary on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let errors = '';
            for (const f of ['/tmp/build.log', '/tmp/test.log']) {
              try {
                const log = fs.readFileSync(f, 'utf8');
                const errLines = log.split('\n').filter(l => /error:|FAIL|failed/i.test(l));
                if (errLines.length > 0) {
                  errors += `### ${f}\n` + errLines.slice(0, 30).join('\n') + '\n\n';
                } else {
                  errors += `### ${f}\n` + log.split('\n').slice(-30).join('\n') + '\n\n';
                }
              } catch {}
            }
            if (!errors) errors = 'No logs captured';
            const body = `## CI Failed\n\n\`\`\`\n${errors.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: ${{ github.event.pull_request.number || 0 }},
              body
            });
