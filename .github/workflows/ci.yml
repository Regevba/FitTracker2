name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    env:
      PROJECT_PATH: FitTracker.xcodeproj
      SCHEME: FitTracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Full CI pipeline
        shell: bash
        run: |
          set -euo pipefail

          # Token pipeline
          echo "::group::Token Pipeline"
          npm install --silent
          make tokens-check
          echo "::endgroup::"

          # Xcode setup
          echo "::group::Xcode Setup"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode apps"
          xcodebuild -version
          echo "::endgroup::"

          # Schemes
          echo "::group::Schemes"
          xcodebuild -project "$PROJECT_PATH" -list
          echo "::endgroup::"

          # Simulator
          echo "::group::Simulator"
          sim_list="$(xcrun simctl list devices available)"
          echo "$sim_list" | grep -i iphone | head -10
          SIM_DEST=""
          for d in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            if echo "$sim_list" | grep -qF "${d} ("; then
              SIM_DEST="platform=iOS Simulator,name=${d}"
              echo "Selected: ${d}"
              break
            fi
          done
          if [ -z "$SIM_DEST" ]; then
            fb="$(echo "$sim_list" | grep -oE 'iPhone [^(]+' | head -1 | xargs)"
            SIM_DEST="platform=iOS Simulator,name=${fb}"
            echo "Fallback: ${fb}"
          fi
          echo "::endgroup::"

          # SPM
          echo "::group::SPM Resolve"
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"
          echo "::endgroup::"

          # Build
          echo "::group::Build"
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/build.log
          echo "::endgroup::"

          # Test
          echo "::group::Test"
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$SIM_DEST" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
          echo "::endgroup::"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 3
          if-no-files-found: ignore

      - name: Comment error summary on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let errors = 'No build log captured (failure was before build step)';
            try {
              const log = fs.readFileSync('/tmp/build.log', 'utf8');
              const errLines = log.split('\n').filter(l => /error:/i.test(l));
              errors = errLines.length > 0
                ? errLines.slice(0, 30).join('\n')
                : log.split('\n').slice(-50).join('\n');
            } catch {}
            const body = `## CI Failed\n\n\`\`\`\n${errors.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: ${{ github.event.pull_request.number || 0 }},
              body
            });
