name: UCC audit log sync

# T22 — Daily pull of fitme-story Vercel Blob → FT2 .claude/logs/ucc-auth-events.jsonl.
#
# Companion to fitme-story/scripts/sync-audit-log-to-blob.ts (T21). The Blob
# URL is a public R2-style HTTPS endpoint set by the fitme-story deploy.
# We fetch it, diff against the committed file, and only commit on change.
#
# Security review: this workflow does NOT consume any user-controlled
# untrusted input (issue titles, PR descriptions, commit messages, etc.).
# All inputs are repo variables and the built-in GITHUB_TOKEN. No
# command-injection surface.

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ucc-audit-log-sync
  cancel-in-progress: false

env:
  BLOB_URL: ${{ vars.UCC_AUDIT_BLOB_URL }}
  TARGET_PATH: .claude/logs/ucc-auth-events.jsonl

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Blob URL configured
        id: check
        run: |
          if [ -z "$BLOB_URL" ]; then
            echo "UCC_AUDIT_BLOB_URL repo variable not set; skipping sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest audit log
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p "$(dirname "$TARGET_PATH")"
          curl --fail --silent --show-error --max-time 60 \
            -o "$TARGET_PATH.new" \
            "$BLOB_URL"

      - name: Diff against committed
        if: steps.check.outputs.skip == 'false'
        id: diff
        run: |
          if [ ! -f "$TARGET_PATH" ]; then
            mv "$TARGET_PATH.new" "$TARGET_PATH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if cmp -s "$TARGET_PATH" "$TARGET_PATH.new"; then
            rm "$TARGET_PATH.new"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            mv "$TARGET_PATH.new" "$TARGET_PATH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + open PR (branch-protection-safe)
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE_STAMP=$(date -u +%Y%m%d)
          BRANCH="chore/ucc-audit-log-sync-${DATE_STAMP}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # If a sync PR for today already exists, push onto its branch (idempotent within the day)
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${BRANCH}"
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
            # bring in the freshly-fetched file
            git checkout main -- "$TARGET_PATH" 2>/dev/null || true
            git add "$TARGET_PATH"
            git commit -m "chore(ucc-auth): daily sync of audit log (append)" || echo "no changes vs branch HEAD"
            git push origin "${BRANCH}"
          else
            git checkout -b "${BRANCH}"
            git add "$TARGET_PATH"
            git commit -m "chore(ucc-auth): daily sync of audit log"
            git push -u origin "${BRANCH}"
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(ucc-auth): daily sync of audit log (${DATE_STAMP})" \
              --body "Daily UCC audit log sync from fitme-story Vercel Blob → \`.claude/logs/ucc-auth-events.jsonl\`.\n\nAutomated by \`.github/workflows/ucc-audit-log-sync.yml\` (T22 companion to fitme-story T21 sync-audit-log-to-blob).\n\nOperator: review the diff and merge when convenient. If multiple daily PRs accumulate, they're cumulative — merge the latest one and close the older ones." || echo "PR likely already exists; skipping creation"
          fi
