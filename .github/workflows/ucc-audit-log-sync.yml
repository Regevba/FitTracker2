name: UCC audit log sync

# T22 — Daily pull of fitme-story Vercel Blob → FT2 .claude/logs/ucc-auth-events.jsonl.
#
# Companion to fitme-story/scripts/sync-audit-log-to-blob.ts (T21). The Blob
# URL is a public R2-style HTTPS endpoint set by the fitme-story deploy.
# We fetch it, diff against the committed file, and only commit on change.
#
# Security review: this workflow does NOT consume any user-controlled
# untrusted input (issue titles, PR descriptions, commit messages, etc.).
# All inputs are repo variables and the built-in GITHUB_TOKEN. No
# command-injection surface.

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ucc-audit-log-sync
  cancel-in-progress: false

env:
  BLOB_URL: ${{ vars.UCC_AUDIT_BLOB_URL }}
  TARGET_PATH: .claude/logs/ucc-auth-events.jsonl

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Blob URL configured
        id: check
        run: |
          if [ -z "$BLOB_URL" ]; then
            echo "UCC_AUDIT_BLOB_URL repo variable not set; skipping sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest audit log
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p "$(dirname "$TARGET_PATH")"
          curl --fail --silent --show-error --max-time 60 \
            -o "$TARGET_PATH.new" \
            "$BLOB_URL"

      - name: Diff against committed
        if: steps.check.outputs.skip == 'false'
        id: diff
        run: |
          if [ ! -f "$TARGET_PATH" ]; then
            mv "$TARGET_PATH.new" "$TARGET_PATH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if cmp -s "$TARGET_PATH" "$TARGET_PATH.new"; then
            rm "$TARGET_PATH.new"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            mv "$TARGET_PATH.new" "$TARGET_PATH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # W37 fix (option B, 2026-06-15): the audit log is append-only — commit it
      # straight to main. Bot PRs (GITHUB_TOKEN) never trigger CI, so under strict
      # branch protection they deadlock ("expected" forever — #614/#676 were
      # abandoned ucc-audit syncs). Direct push needs the github-actions app in
      # main's bypass_pull_request_allowances; until configured the push is
      # rejected and we fall back to the legacy branch+PR (no regression).
      # See .claude/integrity/observed-patterns.md W37.
      - name: Commit audit-log to main (direct push; PR fallback)
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE_STAMP=$(date -u +%Y%m%d)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$TARGET_PATH"
          git commit -m "chore(ucc-auth): daily sync of audit log (${DATE_STAMP})"
          if git push origin "HEAD:main"; then
            echo "✓ Audit log pushed directly to main (${DATE_STAMP})."
            exit 0
          fi
          echo "::warning title=W37 fallback::Direct push to main rejected (bypass not configured?) — opening a PR instead."
          BRANCH="chore/ucc-audit-log-sync-${DATE_STAMP}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            git push origin "HEAD:${BRANCH}" --force-with-lease
          else
            git push -u origin "HEAD:${BRANCH}"
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(ucc-auth): daily sync of audit log (${DATE_STAMP})" \
              --body "Daily UCC audit log sync from fitme-story Vercel Blob → \`.claude/logs/ucc-auth-events.jsonl\`. W37 fallback — direct push to main was rejected (configure bypass_pull_request_allowances to skip the PR). Cumulative; merge the latest." || echo "PR likely already exists; skipping creation"
          fi
