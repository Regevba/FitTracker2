name: Weekly off-platform backup

# R12 (FIT-178) — weekly DR copy of the FT2 git history pushed as a GH
# release. Survives total local SSD loss; cold-restore on a fresh machine
# is `gh release download` + `git clone` from the bundle.
#
# Plan: docs/research/2026-05-19-dev-env-audit-stability-and-scale.md (R12)

on:
  schedule:
    # Sundays 02:00 UTC — 1h before framework-status-weekly Mondays 05:00 UTC,
    # so the backup is fresh when the weekly digest fires.
    - cron: '0 2 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write  # Required to create + upload to releases

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for the bundle

      - name: Compute bundle metadata
        id: meta
        run: |
          BACKUP_DATE=$(date -u +%Y-%m-%d)
          BACKUP_TAG="backup/$BACKUP_DATE"
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          REPO_SIZE_HUMAN=$(du -sh .git | cut -f1)
          {
            echo "backup_date=$BACKUP_DATE"
            echo "backup_tag=$BACKUP_TAG"
            echo "commit_sha=$COMMIT_SHA"
            echo "commit_count=$COMMIT_COUNT"
            echo "repo_size_human=$REPO_SIZE_HUMAN"
          } >> "$GITHUB_OUTPUT"

      - name: Create + verify + checksum git bundle
        env:
          BACKUP_DATE: ${{ steps.meta.outputs.backup_date }}
          EXPECTED_SHA: ${{ steps.meta.outputs.commit_sha }}
        run: |
          mkdir -p artifacts
          BUNDLE="artifacts/fittracker2-${BACKUP_DATE}.bundle"
          git bundle create "$BUNDLE" --all
          ls -lh artifacts/

          # Cold-restore test: clone from the bundle, verify HEAD matches
          TMPDIR=$(mktemp -d)
          git clone --quiet "$BUNDLE" "$TMPDIR/verify"
          ACTUAL_SHA=$(cd "$TMPDIR/verify" && git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Bundle verification FAILED — expected $EXPECTED_SHA, got $ACTUAL_SHA"
            exit 1
          fi
          echo "✓ Bundle restorability verified (HEAD=$ACTUAL_SHA)"
          rm -rf "$TMPDIR"

          # Checksum the bundle
          (cd artifacts && shasum -a 256 "fittracker2-${BACKUP_DATE}.bundle" > "SHASUMS-${BACKUP_DATE}.txt")
          cat "artifacts/SHASUMS-${BACKUP_DATE}.txt"

      - name: Create draft release with bundle attached
        env:
          GH_TOKEN: ${{ github.token }}
          BACKUP_TAG: ${{ steps.meta.outputs.backup_tag }}
          BACKUP_DATE: ${{ steps.meta.outputs.backup_date }}
          COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          COMMIT_COUNT: ${{ steps.meta.outputs.commit_count }}
          REPO_SIZE_HUMAN: ${{ steps.meta.outputs.repo_size_human }}
        run: |
          # Build release notes from env vars (no untrusted-input interpolation)
          NOTES=$(cat <<EOF
          Weekly off-platform backup of FT2 git history.

          **Date:** ${BACKUP_DATE}
          **HEAD:** \`${COMMIT_SHA}\`
          **Commits:** ${COMMIT_COUNT}
          **Bundle size:** ${REPO_SIZE_HUMAN}

          ## Cold-restore

          \`\`\`bash
          gh release download "${BACKUP_TAG}" --repo Regevba/FitTracker2
          git clone "fittracker2-${BACKUP_DATE}.bundle" FitTracker2-restored
          cd FitTracker2-restored
          git remote set-url origin git@github.com:Regevba/FitTracker2.git
          \`\`\`

          ## Verification

          \`\`\`bash
          shasum -a 256 -c "SHASUMS-${BACKUP_DATE}.txt"
          \`\`\`

          Auto-generated by \`.github/workflows/weekly-backup.yml\`. Marked DRAFT
          so it's not publicly visible — only repo collaborators can see + download.
          EOF
          )

          gh release create "$BACKUP_TAG" \
            --draft \
            --title "Weekly backup — ${BACKUP_DATE}" \
            --notes "$NOTES" \
            "artifacts/fittracker2-${BACKUP_DATE}.bundle" \
            "artifacts/SHASUMS-${BACKUP_DATE}.txt"

      - name: Prune old backup releases (keep last 4)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # List all backup/* releases sorted by tag (date-suffixed → natural sort)
          ALL_BACKUPS=$(gh release list --limit 100 --json tagName \
            --jq '[.[] | select(.tagName | startswith("backup/"))] | map(.tagName) | sort | reverse')
          TO_KEEP=$(echo "$ALL_BACKUPS" | jq -r '.[0:4][]' 2>/dev/null || true)
          TO_DELETE=$(echo "$ALL_BACKUPS" | jq -r '.[4:][]' 2>/dev/null || true)

          if [ -n "$TO_DELETE" ]; then
            echo "Pruning old backups:"
            echo "$TO_DELETE" | while read -r tag; do
              [ -z "$tag" ] && continue
              echo "  - deleting $tag"
              gh release delete "$tag" --yes --cleanup-tag || echo "    (delete failed; skipping)"
            done
          else
            echo "Nothing to prune (<=4 backups currently)."
          fi
          echo "Kept tags:"
          echo "$TO_KEEP"
