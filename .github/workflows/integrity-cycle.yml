name: Integrity Cycle

# 72-hour recurring integrity check on .claude/features/*/state.json.
# - Produces a snapshot JSON in .claude/integrity/snapshots/ every cycle
# - Diffs vs the most recent prior snapshot
# - Commits the new snapshot to main (historical ledger)
# - Opens a tracking issue if regressions or new findings appear

on:
  schedule:
    # Every 3 days at 04:00 UTC (~72h cycle)
    - cron: "0 4 */3 * *"
  workflow_dispatch:
    inputs:
      strict:
        description: "Exit 1 on any findings (default false)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve snapshot paths
        id: paths
        run: |
          ts=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          new=".claude/integrity/snapshots/${ts}.json"
          prev=$(ls -1 .claude/integrity/snapshots/*.json 2>/dev/null | tail -1 || true)
          {
            echo "new=${new}"
            echo "prev=${prev}"
            echo "timestamp=${ts}"
          } >> "$GITHUB_OUTPUT"
          echo "New snapshot path: ${new}"
          echo "Previous snapshot path: ${prev:-<none>}"

      # v7.8.4: refresh PR cache before scanning so BROKEN_PR_CITATION +
      # PR_NUMBER_UNRESOLVED don't produce false positives against a stale
      # or missing cache. The cache is .gitignored so each cron run starts cold.
      - name: Refresh PR cache (v7.8.4)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/ensure-pr-cache-fresh.py || echo "::warning::PR cache refresh failed - integrity check may report false-positive citation findings."

      - name: Run integrity check
        id: check
        continue-on-error: true
        env:
          NEW_SNAPSHOT: ${{ steps.paths.outputs.new }}
          PREV_SNAPSHOT: ${{ steps.paths.outputs.prev }}
        run: |
          set -o pipefail
          strict_flag=""
          snapshot_trigger="manual"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            snapshot_trigger="scheduled_cycle"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.strict }}" = "true" ]; then
            strict_flag="--strict"
          fi

          if [ -n "$PREV_SNAPSHOT" ]; then
            python3 scripts/integrity-check.py \
              --snapshot "$NEW_SNAPSHOT" \
              --compare-to "$PREV_SNAPSHOT" \
              --snapshot-trigger "$snapshot_trigger" \
              $strict_flag \
              | tee /tmp/integrity-report.txt
          else
            python3 scripts/integrity-check.py \
              --snapshot "$NEW_SNAPSHOT" \
              --snapshot-trigger "$snapshot_trigger" \
              $strict_flag \
              | tee /tmp/integrity-report.txt
          fi
          status=${PIPESTATUS[0]}
          regression=false
          if grep -q "REGRESSION detected vs previous snapshot" /tmp/integrity-report.txt; then
            regression=true
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "regression=${regression}" >> "$GITHUB_OUTPUT"

      - name: Stage snapshot
        id: stage
        env:
          TIMESTAMP: ${{ steps.paths.outputs.timestamp }}
        run: |
          git add .claude/integrity/snapshots/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes to stage."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Snapshot staged for commit ${TIMESTAMP}."
          fi

      # W37 fix (option B, 2026-06-15): commit the append-only snapshot straight
      # to main. Bot PRs (GITHUB_TOKEN) never trigger CI, so under strict branch
      # protection the required checks stay "expected" and the PR deadlocks
      # (13/13 bot PRs needed hand-merge, 3 abandoned). Direct push needs the
      # github-actions app in main's bypass_pull_request_allowances; until that
      # is configured the push is rejected and we fall back to the legacy PR
      # (no regression). See .claude/integrity/observed-patterns.md W37.
      # Option B (2026-07-13): the append-only snapshot goes to main via a PR
      # opened with WORKFLOW_PR_TOKEN (a PAT), NOT the default GITHUB_TOKEN.
      # Root cause it fixes: PRs opened by GITHUB_TOKEN never trigger the
      # required-check workflows (GitHub recursion guard), so bot PRs deadlock
      # ("3 of 3 required status checks are expected" forever). A PAT-opened PR
      # fires ci-docs-skip + pr-integrity, then auto-merge lands it once green.
      # GitHub's squash-merge commit stays verified (no signature relaxation).
      # The W37 direct-push is still tried first (harmless no-op today; works if
      # a bot bypass is ever configured). If WORKFLOW_PR_TOKEN is unset the whole
      # thing falls back to GITHUB_TOKEN — no regression, just the old deadlock.
      - name: Commit snapshot to main (direct push; PAT-PR + auto-merge fallback)
        if: steps.stage.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PR_TOKEN || secrets.GITHUB_TOKEN }}
          HAVE_PAT: ${{ secrets.WORKFLOW_PR_TOKEN != '' }}
          TIMESTAMP: ${{ steps.paths.outputs.timestamp }}
          NEW_SNAPSHOT: ${{ steps.paths.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude/integrity/snapshots/
          git commit -m "chore(integrity): cycle snapshot ${TIMESTAMP}" \
                     -m "Automated 72h integrity cycle. Run: ${RUN_URL}"
          if git push origin "HEAD:main"; then
            echo "✓ Snapshot pushed directly to main (${TIMESTAMP})."
            exit 0
          fi
          if [ "${HAVE_PAT}" = "true" ]; then
            echo "Direct push rejected — opening a PR via WORKFLOW_PR_TOKEN so CI triggers + auto-merge lands it."
          else
            echo "::warning title=Option B not configured::WORKFLOW_PR_TOKEN secret is unset — falling back to a GITHUB_TOKEN PR, which will NOT trigger required checks and will deadlock. Provision the PAT to close this. See docs/setup/bot-pr-ci-trigger-setup.md."
          fi
          BRANCH="integrity-cycle/${TIMESTAMP}"
          git push -u origin "HEAD:${BRANCH}" --force-with-lease
          gh pr create --base main --head "${BRANCH}" \
            --title "chore(integrity): cycle snapshot ${TIMESTAMP}" \
            --body "Automated 72h integrity cycle snapshot. Snapshot: \`${NEW_SNAPSHOT}\`. Run: ${RUN_URL}. (Opened via WORKFLOW_PR_TOKEN so required checks fire; auto-merge enabled.)" \
            --label "integrity-cycle,automated" || true
          gh pr merge "${BRANCH}" --squash --auto --delete-branch \
            || echo "::warning title=auto-merge::Could not enable auto-merge (PAT unset or perms) — PR will need a manual merge once checks pass."

      - name: Package report for issue body
        if: steps.check.outputs.regression == 'true'
        run: |
          # Trim report to 12KB and pass as multi-line env var to github-script.
          # Passing via env keeps the script step free of filesystem reads.
          head -c 12000 /tmp/integrity-report.txt > /tmp/integrity-report-trim.txt
          {
            echo "REPORT<<INTEGRITY_EOF"
            cat /tmp/integrity-report-trim.txt
            echo "INTEGRITY_EOF"
          } >> "$GITHUB_ENV"

      - name: Open issue on regression
        if: steps.check.outputs.regression == 'true'
        uses: actions/github-script@v9
        env:
          NEW_SNAPSHOT: ${{ steps.paths.outputs.new }}
          TIMESTAMP: ${{ steps.paths.outputs.timestamp }}
        with:
          script: |
            const report = process.env.REPORT || '';
            const timestamp = process.env.TIMESTAMP;
            const snapshot = process.env.NEW_SNAPSHOT;
            const title = `Integrity cycle ${timestamp}: regression detected`;
            const body = [
              `The 72h integrity cycle detected a regression vs the prior snapshot.`,
              ``,
              `- Snapshot: \`${snapshot}\``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `## Report`,
              '```',
              report,
              '```',
              ``,
              `Triage: inspect the "## Diff vs previous" section. New findings appear under \`findings.new\`; resolved findings are in \`findings.resolved\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['integrity-cycle', 'regression']
            });

      - name: Summary
        run: |
          {
            echo "## Integrity Cycle Report"
            echo '```'
            cat /tmp/integrity-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
