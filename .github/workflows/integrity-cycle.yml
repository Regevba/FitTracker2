name: Integrity Cycle

# 72-hour recurring integrity check on .claude/features/*/state.json.
# - Produces a snapshot JSON in .claude/integrity/snapshots/ every cycle
# - Diffs vs the most recent prior snapshot
# - Commits the new snapshot to main (historical ledger)
# - Opens a tracking issue if regressions or new findings appear

on:
  schedule:
    # Every 3 days at 04:00 UTC (~72h cycle)
    - cron: "0 4 */3 * *"
  workflow_dispatch:
    inputs:
      strict:
        description: "Exit 1 on any findings (default false)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve snapshot paths
        id: paths
        run: |
          ts=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          new=".claude/integrity/snapshots/${ts}.json"
          prev=$(ls -1 .claude/integrity/snapshots/*.json 2>/dev/null | tail -1 || true)
          {
            echo "new=${new}"
            echo "prev=${prev}"
            echo "timestamp=${ts}"
          } >> "$GITHUB_OUTPUT"
          echo "New snapshot path: ${new}"
          echo "Previous snapshot path: ${prev:-<none>}"

      # v7.8.4: refresh PR cache before scanning so BROKEN_PR_CITATION +
      # PR_NUMBER_UNRESOLVED don't produce false positives against a stale
      # or missing cache. The cache is .gitignored so each cron run starts cold.
      - name: Refresh PR cache (v7.8.4)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/ensure-pr-cache-fresh.py || echo "::warning::PR cache refresh failed - integrity check may report false-positive citation findings."

      - name: Run integrity check
        id: check
        continue-on-error: true
        env:
          NEW_SNAPSHOT: ${{ steps.paths.outputs.new }}
          PREV_SNAPSHOT: ${{ steps.paths.outputs.prev }}
        run: |
          set -o pipefail
          strict_flag=""
          snapshot_trigger="manual"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            snapshot_trigger="scheduled_cycle"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.strict }}" = "true" ]; then
            strict_flag="--strict"
          fi

          if [ -n "$PREV_SNAPSHOT" ]; then
            python3 scripts/integrity-check.py \
              --snapshot "$NEW_SNAPSHOT" \
              --compare-to "$PREV_SNAPSHOT" \
              --snapshot-trigger "$snapshot_trigger" \
              $strict_flag \
              | tee /tmp/integrity-report.txt
          else
            python3 scripts/integrity-check.py \
              --snapshot "$NEW_SNAPSHOT" \
              --snapshot-trigger "$snapshot_trigger" \
              $strict_flag \
              | tee /tmp/integrity-report.txt
          fi
          status=${PIPESTATUS[0]}
          regression=false
          if grep -q "REGRESSION detected vs previous snapshot" /tmp/integrity-report.txt; then
            regression=true
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "regression=${regression}" >> "$GITHUB_OUTPUT"

      - name: Stage snapshot
        id: stage
        env:
          TIMESTAMP: ${{ steps.paths.outputs.timestamp }}
        run: |
          git add .claude/integrity/snapshots/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes to stage."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Snapshot staged for commit ${TIMESTAMP}."
          fi

      # Option B (2026-07-13, completed): land the append-only snapshot on main
      # via a SIGNED-commit PR that auto-merges. Two blockers had to be closed:
      #   1. PRs opened by GITHUB_TOKEN never trigger the required-check workflows
      #      (GitHub recursion guard) → checks stay "expected" → deadlock.
      #      Fix: open the PR with WORKFLOW_PR_TOKEN (a PAT) so CI fires.
      #   2. main has required_signatures on; a runner `git commit` is UNSIGNED,
      #      so even a CI-triggering PR can't merge ("base branch policy prohibits").
      #      Fix: create the commit via GraphQL createCommitOnBranch, which GitHub
      #      auto-signs (verified) — no branch-protection change, no signature
      #      relaxation, least-privilege PAT (Contents R/W + PRs R/W).
      # scripts/create-signed-snapshot-pr.py does both + enables squash auto-merge.
      # If WORKFLOW_PR_TOKEN is unset it runs as GITHUB_TOKEN → old deadlock
      # (no regression); the warning below flags it. See W37 + docs/setup/bot-pr-ci-trigger-setup.md.
      - name: Land snapshot on main (signed PR + auto-merge)
        if: steps.stage.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PR_TOKEN || secrets.GITHUB_TOKEN }}
          HAVE_PAT: ${{ secrets.WORKFLOW_PR_TOKEN != '' }}
          TIMESTAMP: ${{ steps.paths.outputs.timestamp }}
          NEW_SNAPSHOT: ${{ steps.paths.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${HAVE_PAT}" != "true" ]; then
            echo "::warning title=Option B not configured::WORKFLOW_PR_TOKEN unset — the PR runs as GITHUB_TOKEN, will NOT trigger required checks, and will deadlock. Provision the PAT. See docs/setup/bot-pr-ci-trigger-setup.md."
          fi
          git add .claude/integrity/snapshots/
          python3 scripts/create-signed-snapshot-pr.py \
            --repo "${REPO}" \
            --branch "integrity-cycle/${TIMESTAMP}" \
            --base main \
            --message "chore(integrity): cycle snapshot ${TIMESTAMP}" \
            --message-body "Automated 72h integrity cycle. Run: ${RUN_URL}" \
            --pr-title "chore(integrity): cycle snapshot ${TIMESTAMP}" \
            --pr-body "Automated 72h integrity cycle snapshot. Snapshot: \`${NEW_SNAPSHOT}\`. Run: ${RUN_URL}. (Signed commit via createCommitOnBranch; auto-merge enabled.)" \
            --label integrity-cycle --label automated

      - name: Package report for issue body
        if: steps.check.outputs.regression == 'true'
        run: |
          # Trim report to 12KB and pass as multi-line env var to github-script.
          # Passing via env keeps the script step free of filesystem reads.
          head -c 12000 /tmp/integrity-report.txt > /tmp/integrity-report-trim.txt
          {
            echo "REPORT<<INTEGRITY_EOF"
            cat /tmp/integrity-report-trim.txt
            echo "INTEGRITY_EOF"
          } >> "$GITHUB_ENV"

      - name: Open issue on regression
        if: steps.check.outputs.regression == 'true'
        uses: actions/github-script@v9
        env:
          NEW_SNAPSHOT: ${{ steps.paths.outputs.new }}
          TIMESTAMP: ${{ steps.paths.outputs.timestamp }}
        with:
          script: |
            const report = process.env.REPORT || '';
            const timestamp = process.env.TIMESTAMP;
            const snapshot = process.env.NEW_SNAPSHOT;
            const title = `Integrity cycle ${timestamp}: regression detected`;
            const body = [
              `The 72h integrity cycle detected a regression vs the prior snapshot.`,
              ``,
              `- Snapshot: \`${snapshot}\``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `## Report`,
              '```',
              report,
              '```',
              ``,
              `Triage: inspect the "## Diff vs previous" section. New findings appear under \`findings.new\`; resolved findings are in \`findings.resolved\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['integrity-cycle', 'regression']
            });

      - name: Summary
        run: |
          {
            echo "## Integrity Cycle Report"
            echo '```'
            cat /tmp/integrity-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
