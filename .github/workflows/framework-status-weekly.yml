name: Framework Status — Weekly

# v7.6 Phase 2c (shipped 2026-04-25). Weekly readout-time snapshot of the
# v7.5 measurement-adoption ledger and a regression watcher. Complements:
#   - integrity-cycle.yml (every 72h, gates state.json health)
#   - pr-integrity-check.yml (per-PR, blocks new findings vs main)
# This workflow is purely observational: it appends a dated snapshot to the
# measurement-adoption history (one per week) and opens an issue if the
# fully-adopted count or any dimension coverage regresses vs the prior
# snapshot. It never blocks merges. The 72h cycle owns blocking; this owns
# the weekly trend.
#
# Security note (per github.blog injection guide): all dynamic values used
# inside `run:` blocks are routed through the `env:` block, never via
# `${{ }}` interpolation directly into shell. Step outputs we set ourselves
# (regression flag, current/prior counts) are integers or hex-safe text we
# control. The only direct `${{ }}` usages outside env: blocks are in `if:`
# conditions, which evaluate in GitHub's expression engine, not in a shell.

on:
  schedule:
    # Every Monday at 05:00 UTC. Spaced 1h after the integrity cycle so the
    # two cron workflows don't queue against each other on the same runner
    # pool.
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      open_issue_on_no_regression:
        description: "Open the weekly digest issue even when no regression (default false)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  weekly-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Capture prior measurement-adoption snapshot count
        id: prior
        run: |
          set +e
          history=".claude/shared/measurement-adoption-history.json"
          if [ ! -f "$history" ]; then
            echo "prior_count=0" >> "$GITHUB_OUTPUT"
            echo "prior_fully=0" >> "$GITHUB_OUTPUT"
            echo "prior_any=0" >> "$GITHUB_OUTPUT"
            echo "prior_date=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$history" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          h = json.load(open(sys.argv[1]))
          snaps = h.get("snapshots", [])
          if not snaps:
              print("prior_count=0")
              print("prior_fully=0")
              print("prior_any=0")
              print("prior_date=")
          else:
              last = snaps[-1]
              s = last.get("summary", {})
              fully = int(s.get("fully_adopted", 0))
              partial = int(s.get("partial_adopted", 0))
              print(f"prior_count={len(snaps)}")
              print(f"prior_fully={fully}")
              print(f"prior_any={fully + partial}")
              print(f"prior_date={last.get('date','')}")
          PY

      - name: Run weekly measurement-adoption snapshot
        id: adoption
        run: |
          set -o pipefail
          python3 scripts/measurement-adoption-report.py \
            --snapshot-trigger weekly_status \
            2>&1 | tee /tmp/weekly-adoption.txt

      - name: Run documentation-debt readout
        id: debt
        continue-on-error: true
        run: |
          set +e
          python3 scripts/documentation-debt-report.py 2>&1 | tee /tmp/weekly-debt.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Compare current vs prior, set regression flag
        id: compare
        env:
          PRIOR_FULLY: ${{ steps.prior.outputs.prior_fully }}
          PRIOR_ANY: ${{ steps.prior.outputs.prior_any }}
          PRIOR_DATE: ${{ steps.prior.outputs.prior_date }}
        run: |
          set +e
          current=".claude/shared/measurement-adoption.json"
          python3 - "$current" "$PRIOR_FULLY" "$PRIOR_ANY" "$PRIOR_DATE" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          report = json.load(open(sys.argv[1]))
          prior_fully = int(sys.argv[2] or 0)
          prior_any = int(sys.argv[3] or 0)
          prior_date = sys.argv[4]
          s = report["summary"]
          cur_fully = int(s.get("fully_adopted", 0))
          cur_partial = int(s.get("partial_adopted", 0))
          cur_any = cur_fully + cur_partial
          regression = cur_fully < prior_fully or cur_any < prior_any
          print(f"current_fully={cur_fully}")
          print(f"current_any={cur_any}")
          print(f"prior_fully={prior_fully}")
          print(f"prior_any={prior_any}")
          print(f"prior_date={prior_date}")
          print(f"regression={'true' if regression else 'false'}")
          delta_fully = cur_fully - prior_fully
          delta_any = cur_any - prior_any
          print(f"delta_fully={delta_fully}")
          print(f"delta_any={delta_any}")
          PY

      - name: Run weekly trend scan (A2 gate-coverage zero-drift + A4 per-dimension)
        id: trend
        continue-on-error: true
        run: |
          set +e
          python3 scripts/weekly-trend-scan.py 2>&1 | tee /tmp/weekly-trend.txt

      - name: Refresh per-gate last_fired_at index (F17)
        id: gate_last_fired
        continue-on-error: true
        # v7.9.1 F17 — materialize per-gate last_fired_at index nightly from
        # gate-coverage.jsonl. Read-only derived artifact; safe to fail
        # without blocking the weekly snapshot. Enables planned v7.10
        # GATE_COVERAGE_ZERO meta-check at O(1) instead of O(records × gates).
        # No untrusted input — static script invocation only.
        run: |
          python3 scripts/refresh-gate-last-fired.py

      - name: Stage history snapshot
        id: stage
        run: |
          git add .claude/shared/measurement-adoption-history.json \
                  .claude/shared/measurement-adoption.json \
                  .claude/shared/documentation-debt.json \
                  .claude/shared/gate-coverage-weekly.jsonl \
                  .claude/shared/gate-last-fired.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes to stage."
          else
            today=$(date -u +%Y-%m-%d)
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "today=${today}" >> "$GITHUB_OUTPUT"
            echo "Snapshot staged for ${today}."
          fi

      # Option B (2026-07-13, completed): land the weekly snapshot on main via a
      # SIGNED-commit PR that auto-merges. Closes BOTH deadlock blockers that
      # stranded bot PRs: (1) GITHUB_TOKEN PRs never trigger the required-check
      # workflows (recursion guard) -> open the PR with WORKFLOW_PR_TOKEN (a PAT)
      # so CI fires; (2) main has required_signatures on and a runner `git commit`
      # is UNSIGNED, so even a CI-triggering PR can't merge -> create the commit
      # via GraphQL createCommitOnBranch, which GitHub auto-signs (verified). No
      # branch-protection change, no signature relaxation, least-privilege PAT.
      # scripts/create-signed-snapshot-pr.py does both + squash auto-merge and
      # commits the multi-file weekly snapshot atomically. If WORKFLOW_PR_TOKEN is
      # unset it runs as GITHUB_TOKEN -> old deadlock (no regression); the warning
      # below flags it. Replaces the former direct-push + peter-evans + B14 shell
      # fallback. See observed-patterns.md W37 + docs/setup/bot-pr-ci-trigger-setup.md.
      - name: Land weekly snapshot on main (signed PR + auto-merge)
        if: steps.stage.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PR_TOKEN || secrets.GITHUB_TOKEN }}
          HAVE_PAT: ${{ secrets.WORKFLOW_PR_TOKEN != '' }}
          TODAY: ${{ steps.stage.outputs.today }}
          REGRESSION: ${{ steps.compare.outputs.regression }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${HAVE_PAT}" != "true" ]; then
            echo "::warning title=Option B not configured::WORKFLOW_PR_TOKEN unset - the PR runs as GITHUB_TOKEN, will NOT trigger required checks, and will deadlock. Provision the PAT. See docs/setup/bot-pr-ci-trigger-setup.md."
          fi
          git add -A
          python3 scripts/create-signed-snapshot-pr.py \
            --repo "${REPO}" \
            --branch "framework-status/${TODAY}" \
            --base main \
            --message "chore(framework-status): weekly snapshot ${TODAY} (Regression=${REGRESSION})" \
            --message-body "Automated weekly framework-status cycle. Run: ${RUN_URL}" \
            --pr-title "chore(framework-status): weekly snapshot ${TODAY}" \
            --pr-body "Automated weekly framework-status snapshot. Regression=${REGRESSION}. Run: ${RUN_URL}. (Signed commit via createCommitOnBranch; auto-merge enabled.) Merging persists the cron-tagged snapshot - required for Tier 1.1 trend mode." \
            --label framework-status --label automated

      - name: Package digest body
        if: always()
        env:
          CURRENT_FULLY: ${{ steps.compare.outputs.current_fully }}
          CURRENT_ANY: ${{ steps.compare.outputs.current_any }}
          PRIOR_FULLY: ${{ steps.compare.outputs.prior_fully }}
          PRIOR_ANY: ${{ steps.compare.outputs.prior_any }}
          PRIOR_DATE: ${{ steps.compare.outputs.prior_date }}
          DELTA_FULLY: ${{ steps.compare.outputs.delta_fully }}
          DELTA_ANY: ${{ steps.compare.outputs.delta_any }}
          REGRESSION: ${{ steps.compare.outputs.regression }}
          A2_REGRESSION: ${{ steps.trend.outputs.a2_gate_regression }}
          A4_REGRESSION: ${{ steps.trend.outputs.a4_dim_regression }}
        run: |
          # OR the new A2/A4 regression flags into the master regression flag.
          if [ "$A2_REGRESSION" = "true" ] || [ "$A4_REGRESSION" = "true" ]; then
            REGRESSION_COMBINED="true"
          else
            REGRESSION_COMBINED="$REGRESSION"
          fi
          echo "regression_combined=${REGRESSION_COMBINED}" >> "$GITHUB_OUTPUT"
          {
            echo "DIGEST<<DIGEST_EOF"
            echo "## Weekly framework-status digest"
            echo ""
            echo "**Regression (any source):** ${REGRESSION_COMBINED}"
            echo ""
            echo "- Tier 1.1 fully/any adoption: ${REGRESSION}"
            echo "- A2 gate-coverage zero-drift: ${A2_REGRESSION}"
            echo "- A4 per-dimension trend: ${A4_REGRESSION}"
            echo ""
            echo "### Tier 1.1 measurement adoption"
            echo "- Fully adopted: ${CURRENT_FULLY} (Δ ${DELTA_FULLY} vs ${PRIOR_DATE:-baseline})"
            echo "- Any adoption: ${CURRENT_ANY} (Δ ${DELTA_ANY} vs ${PRIOR_DATE:-baseline})"
            echo ""
            echo "### Weekly trend scan (A2 + A4)"
            echo '```'
            head -c 4000 /tmp/weekly-trend.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "### Adoption report (head)"
            echo '```'
            head -c 4000 /tmp/weekly-adoption.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "### Documentation-debt report (head)"
            echo '```'
            head -c 4000 /tmp/weekly-debt.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo "DIGEST_EOF"
          } >> "$GITHUB_ENV"

      - name: Open digest issue
        if: steps.compare.outputs.regression == 'true' || steps.trend.outputs.a2_gate_regression == 'true' || steps.trend.outputs.a4_dim_regression == 'true' || steps.trend.outputs.auth_lockout_detected == 'true' || inputs.open_issue_on_no_regression == 'true'
        uses: actions/github-script@v9
        env:
          REGRESSION: ${{ steps.compare.outputs.regression }}
          A2_REGRESSION: ${{ steps.trend.outputs.a2_gate_regression }}
          A4_REGRESSION: ${{ steps.trend.outputs.a4_dim_regression }}
          AUTH_LOCKOUT: ${{ steps.trend.outputs.auth_lockout_detected }}
        with:
          script: |
            const adoptionRegr = process.env.REGRESSION === 'true';
            const a2Regr = process.env.A2_REGRESSION === 'true';
            const a4Regr = process.env.A4_REGRESSION === 'true';
            const authLockout = process.env.AUTH_LOCKOUT === 'true';
            const regression = adoptionRegr || a2Regr || a4Regr;
            // A6 auth-lockout is a security anomaly, not a measurement regression —
            // it opens the issue and flags the title, but keeps its own reason label.
            const anomaly = regression || authLockout;
            const digest = process.env.DIGEST || '(empty)';
            const today = new Date().toISOString().slice(0, 10);
            const reasons = [];
            if (adoptionRegr) reasons.push('measurement-adoption');
            if (a2Regr) reasons.push('A2 gate-coverage');
            if (a4Regr) reasons.push('A4 per-dimension');
            if (authLockout) reasons.push('A6 auth-lockout');
            const title = anomaly
              ? `Framework status ${today}: ${authLockout && !regression ? 'security — auth lockout' : 'regression'} — ${reasons.join(', ')}`
              : `Framework status ${today}: weekly digest`;
            const labels = anomaly
              ? ['framework-status', authLockout ? 'security' : 'regression']
              : ['framework-status'];
            const body = [
              digest,
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });

      - name: Workflow summary
        if: always()
        env:
          CURRENT_FULLY: ${{ steps.compare.outputs.current_fully }}
          CURRENT_ANY: ${{ steps.compare.outputs.current_any }}
          PRIOR_FULLY: ${{ steps.compare.outputs.prior_fully }}
          PRIOR_ANY: ${{ steps.compare.outputs.prior_any }}
          DELTA_FULLY: ${{ steps.compare.outputs.delta_fully }}
          DELTA_ANY: ${{ steps.compare.outputs.delta_any }}
          REGRESSION: ${{ steps.compare.outputs.regression }}
        run: |
          {
            echo "## Weekly framework-status summary"
            echo ""
            echo "| Metric | Current | Prior | Delta |"
            echo "|---|---|---|---|"
            printf '| Fully adopted | %s | %s | %s |\n' "$CURRENT_FULLY" "$PRIOR_FULLY" "$DELTA_FULLY"
            printf '| Any adoption | %s | %s | %s |\n' "$CURRENT_ANY" "$PRIOR_ANY" "$DELTA_ANY"
            echo ""
            echo "**Regression:** $REGRESSION"
            echo ""
            echo "### Adoption report"
            echo '```'
            cat /tmp/weekly-adoption.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "### Documentation-debt report"
            echo '```'
            cat /tmp/weekly-debt.txt 2>/dev/null || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
