name: Lint

# Dev-env Track B (R7 SwiftLint + R8 ruff + R12 markdownlint).
# All static inputs; no untrusted-input interpolation.
#
# Track A shipped config files (.swiftlint.yml + .ruff.toml + .markdownlint-cli2.jsonc)
# on 2026-05-24. Track B (this workflow + Makefile targets) deferred until
# post-Phase-E exit (2026-06-04) per dev-env-master-plan §3.
#
# Three independent jobs so a failure in one tool doesn't mask the other two.
# Each job is fail-on-finding (strict mode); local `make lint` skips cleanly
# if the tool isn't installed but CI always has the tools.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'FitTracker/**'
      - 'FitTrackerTests/**'
      - 'FitTrackerUITests/**'
      - 'scripts/**'
      - 'ai-engine/**'
      - 'docs/**'
      - 'CLAUDE.md'
      - 'README.md'
      - 'AGENTS.md'
      - '.swiftlint.yml'
      - '.ruff.toml'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/lint.yml'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-ios:
    name: lint-ios (SwiftLint)
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install SwiftLint via Homebrew
        run: brew install swiftlint

      - name: Run SwiftLint (strict — fail on warnings)
        run: swiftlint lint --strict --config .swiftlint.yml

  lint-py:
    name: lint-py (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff (strict — fail on any finding)
        run: ruff check scripts/ ai-engine/

  lint-md:
    name: lint-md (markdownlint-cli2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint-cli2
        run: markdownlint-cli2 'docs/**/*.md' 'CLAUDE.md' 'README.md' 'AGENTS.md'
