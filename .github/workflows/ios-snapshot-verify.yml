name: iOS Snapshot — Verify (advisory)

# FIT-152 (T4/T2) — runs the snapshot tests in SNAPSHOT_MODE=verify against the
# committed CI-recorded baselines (FitTrackerTests/SnapshotTests/__Snapshots__/).
#
# ADVISORY by design: this job is NOT in main's required status checks, so a
# snapshot diff surfaces on the PR (and uploads the diff artifact) but never
# blocks a merge. Snapshot tests are a documented high-flake surface (see
# CLAUDE.md "UI test coverage strategy"); running verify advisory-first is the
# calibration window — promote to a required check only after it proves stable.
#
# Path-filtered to the UI code the snapshots cover + the baselines/harness
# themselves, so unrelated PRs don't spin up a 40-minute macOS runner.
#
# Security: no github.event.* input and no ${{ }} interpolation inside run: —
# the simulator destination is computed as a shell variable (mirrors the
# ios-snapshot-record recorder).

on:
  pull_request:
    paths:
      - 'FitTracker/**'
      - 'FitTrackerTests/SnapshotTests/**'
      - 'FitTracker.xcodeproj/**'
      - '.github/workflows/ios-snapshot-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-snapshot-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: FitTracker.xcodeproj
  SCHEME: FitTracker

jobs:
  verify:
    name: iOS Snapshot Verify
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies -project "$PROJECT_PATH" -scheme "$SCHEME"

      # Firebase config is gitignored; provide it (or a stub) so the app target
      # builds. The stub is fine for snapshot UI rendering. Mirrors ci.yml.
      - name: Decode GoogleService-Info.plist
        env:
          PLIST_BASE64: ${{ secrets.GOOGLESERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "$PLIST_BASE64" ]; then
            echo "::warning::GOOGLESERVICE_INFO_PLIST_BASE64 not set — writing stub plist (fine for snapshot UI)."
            cat > FitTracker/GoogleService-Info.plist <<'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key><string>com.fittracker.regev</string>
            <key>PROJECT_ID</key><string>stub-no-secret</string>
            <key>GCM_SENDER_ID</key><string>0</string>
            <key>GOOGLE_APP_ID</key><string>1:0:ios:stub</string>
            <key>API_KEY</key><string>stub</string>
            <key>STORAGE_BUCKET</key><string>stub.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
          </dict>
          </plist>
          PLIST_EOF
            exit 0
          fi
          echo "$PLIST_BASE64" | base64 -d > FitTracker/GoogleService-Info.plist
          echo "Decoded plist ($(wc -c < FitTracker/GoogleService-Info.plist) bytes)"

      - name: Verify snapshots against committed baselines
        env:
          SNAPSHOT_MODE: verify
        run: |
          set -o pipefail
          # Same simulator family the baselines were recorded on (the recorder
          # and this verifier share the selection ladder), so the reference PNGs
          # match at the 0.98 precision the tests assert.
          sim_list="$(xcrun simctl list devices available)"
          SIM_DEST=""
          for d in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            if echo "$sim_list" | grep -qF "${d} ("; then
              SIM_DEST="platform=iOS Simulator,name=${d}"
              break
            fi
          done
          if [ -z "$SIM_DEST" ]; then
            fb="$(echo "$sim_list" | grep -oE 'iPhone [^(]+' | head -1 | xargs)"
            SIM_DEST="platform=iOS Simulator,name=${fb}"
          fi
          echo "Selected simulator: ${SIM_DEST}"
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$SIM_DEST" \
            -only-testing:FitTrackerTests/V2ComponentSnapshotTests \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-verify-diffs
          path: |
            **/__Snapshots__/**
          if-no-files-found: warn
          retention-days: 14
